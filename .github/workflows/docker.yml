name: AllergyLab CI/CD

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:     
    - name: Checkout source
      uses: actions/checkout@v4
    - name: Build images
      run: |
        cd Part7a
        docker build -t ${{ secrets.mumbak}}/al-app:latest ./app
        docker build -t ${{ secrets.mumbak}}/al-db-loader:latest ./db-loader
        docker build -t ${{ secrets.mumbak}}/al-email:latest ./email  
    - name: Log in to Docker
      uses: docker/login-action@v3
      with:
        username: ${{secrets.mumbak}}
        password: ${{secrets.mumbak}}  
    - name: Push images to DockerHub
      run: |
        docker push ${{ secrets.mumbak}}/al-app:latest
        docker push ${{ secrets.mumbak}}/al-db-loader:latest
        docker push ${{ secrets.mumbak}}/al-email:latest 